<!-- 
  Template de Listagem de Pratos
  
  Estrutura:
  - Título da página com botão de adicionar
  - Tabela com os pratos cadastrados
  - Spinner de carregamento enquanto busca dados
  - Mensagem quando não há pratos cadastrados
-->

<div class="container">
  <!-- Cabeçalho da página -->
  <div class="header">
    <h2>Gestão de Pratos</h2>
    <p class="subtitle">Gerencie os pratos e bebidas do cardápio</p>
  </div>

  <!-- Botão para adicionar novo prato -->
  <div class="actions">
    <button 
      mat-raised-button 
      color="primary" 
      (click)="novoPrato()"
      matTooltip="Adicionar novo prato ao cardápio">
      <mat-icon>add</mat-icon>
      Novo Prato
    </button>
  </div>

  <!-- Card contendo a tabela -->
  <mat-card class="table-card">
    
    <!-- Spinner de carregamento -->
    <div *ngIf="carregando" class="loading-container">
      <mat-spinner diameter="50"></mat-spinner>
      <p>Carregando pratos...</p>
    </div>

    <!-- Tabela de pratos -->
    <table 
      mat-table 
      [dataSource]="pratos" 
      *ngIf="!carregando && pratos.length > 0"
      class="pratos-table">

      <!-- Coluna ID -->
      <ng-container matColumnDef="idPrato">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let prato">{{ prato.idPrato }}</td>
      </ng-container>

      <!-- Coluna Nome -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let prato">{{ prato.nome }}</td>
      </ng-container>

      <!-- Coluna Preço -->
      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let prato" class="preco-cell">
          {{ formatarPreco(prato.preco) }}
        </td>
      </ng-container>

      <!-- Coluna Ações -->
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef class="acoes-header">Ações</th>
        <td mat-cell *matCellDef="let prato" class="acoes-cell">
          <!-- Botão Editar -->
          <button 
            mat-icon-button 
            color="primary" 
            (click)="editarPrato(prato.idPrato)"
            matTooltip="Editar prato">
            <mat-icon>edit</mat-icon>
          </button>
          
          <!-- Botão Excluir -->
          <button 
            mat-icon-button 
            color="warn" 
            (click)="confirmarExclusao(prato)"
            matTooltip="Excluir prato">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Linhas da tabela -->
      <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
    </table>

    <!-- Mensagem quando não há pratos -->
    <div *ngIf="!carregando && pratos.length === 0" class="empty-state">
      <mat-icon class="empty-icon">restaurant_menu</mat-icon>
      <h3>Nenhum prato cadastrado</h3>
      <p>Clique no botão "Novo Prato" para começar a cadastrar.</p>
    </div>

  </mat-card>
</div>
