<div class="page-container">

  <!-- Cabeçalho -->
  <div class="page-header">
    <div class="header-title">
      <mat-icon>restaurant_menu</mat-icon>
      <h1>Pratos</h1>
    </div>
    <button mat-raised-button color="primary" (click)="novoPrato()">
      <mat-icon>add</mat-icon>
      Novo Prato
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-wrapper" *ngIf="carregando">
    <mat-spinner diameter="48"></mat-spinner>
    <p>Carregando pratos...</p>
  </div>

  <!-- Tabela -->
  <mat-card *ngIf="!carregando">
    <table mat-table [dataSource]="pratos" class="pratos-table">

      <!-- Coluna ID -->
      <ng-container matColumnDef="idPrato">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let prato">{{ prato.id }}</td>
      </ng-container>

      <!-- Coluna Nome -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let prato">{{ prato.nome }}</td>
      </ng-container>

      <!-- Coluna Preço -->
      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let prato" class="preco-cell">
          {{ formatarPreco(prato.preco) }}
        </td>
      </ng-container>

      <!-- Coluna Ações -->
      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef class="acoes-header">Ações</th>
        <td mat-cell *matCellDef="let prato" class="acoes-cell">
          <!-- Botão Editar -->
          <button
            mat-icon-button
            color="primary"
            (click)="editarPrato(prato.id)"
            matTooltip="Editar prato">
            <mat-icon>edit</mat-icon>
          </button>

          <!-- Botão Excluir -->
          <button
            mat-icon-button
            color="warn"
            (click)="confirmarExclusao(prato)"
            matTooltip="Excluir prato">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
    </table>

    <div class="sem-dados" *ngIf="pratos.length === 0">
      <mat-icon>inbox</mat-icon>
      <p>Nenhum prato cadastrado.</p>
    </div>
  </mat-card>

</div>
